<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KELURAHAN GUNUNG TINGGI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6ff;
}

/* OPENING */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(90deg,#004aad,#0077ff);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    z-index:999;
}

/* HEADER */
header{
    background:#004aad;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* ADMIN BUTTON */
#adminBtn{
    background:white;
    color:#004aad;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:12px;
}

/* STAR */
.star{
    font-size:40px;
    cursor:pointer;
    color:#ccc;
}
.star.active{
    color:gold;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
th{
    background:#004aad;
    color:white;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}
.modal-content{
    background:white;
    padding:20px;
    border-radius:10px;
}
button{
    cursor:pointer;
}
</style>
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
KELURAHAN GUNUNG TINGGI
</div>

<header>
<h3>Kritik & Saran</h3>
<button id="adminBtn" onclick="openLogin()">Admin</button>
</header>

<!-- FORM -->
<div class="container">
<h3>Berikan Kritik & Saran</h3>

<input id="nama" placeholder="Nama"><br><br>

<select id="jenis">
<option>Kritik</option>
<option>Saran</option>
</select><br><br>

<textarea id="pesan" placeholder="Tulis disini"></textarea><br><br>

<div>
<span class="star" onclick="rate(1)">★</span>
<span class="star" onclick="rate(2)">★</span>
<span class="star" onclick="rate(3)">★</span>
<span class="star" onclick="rate(4)">★</span>
<span class="star" onclick="rate(5)">★</span>
</div>

<br>

<button onclick="kirim()">Kirim</button>
</div>

<!-- PUBLIK TABLE -->
<div class="container">
<h3>Data Publik</h3>
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Jenis</th>
<th>Pesan</th>
<th>Rating</th>
</tr>
</thead>
<tbody id="publicTable"></tbody>
</table>
</div>

<!-- ADMIN TABLE -->
<div class="container" id="adminPanel" style="display:none;">
<h3>Admin Panel</h3>
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Jenis</th>
<th>Pesan</th>
<th>Rating</th>
<th>Edit</th>
<th>Hapus</th>
</tr>
</thead>
<tbody id="adminTable"></tbody>
</table>
</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Login Admin</h3>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "ISI",
  authDomain: "ISI",
  projectId: "ISI",
  storageBucket: "ISI",
  messagingSenderId: "ISI",
  appId: "ISI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let rating = 0;

/* SPLASH */
setTimeout(()=>{
    document.getElementById("splash").style.display="none";
},2000);

/* RATING */
function rate(n){
    rating = n;
    document.querySelectorAll(".star").forEach((s,i)=>{
        s.classList.toggle("active", i<n);
    });
}

/* KIRIM */
function kirim(){
    db.collection("kritik").add({
        nama:nama.value,
        jenis:jenis.value,
        pesan:pesan.value,
        rating:rating,
        time:Date.now()
    });
    alert("Terkirim");
    load();
}

/* LOAD */
function load(){
    db.collection("kritik").get().then(snap=>{
        publicTable.innerHTML="";
        adminTable.innerHTML="";
        let no=1;

        snap.forEach(doc=>{
            let d=doc.data();

            publicTable.innerHTML+=`
            <tr>
            <td>${no}</td>
            <td>${d.nama}</td>
            <td>${d.jenis}</td>
            <td>${d.pesan}</td>
            <td>${"★".repeat(d.rating)}</td>
            </tr>`;

            adminTable.innerHTML+=`
            <tr>
            <td>${no}</td>
            <td>${d.nama}</td>
            <td>${d.jenis}</td>
            <td><input value="${d.pesan}" id="p${doc.id}"></td>
            <td>
                <select id="r${doc.id}">
                <option ${d.rating==1?"selected":""}>1</option>
                <option ${d.rating==2?"selected":""}>2</option>
                <option ${d.rating==3?"selected":""}>3</option>
                <option ${d.rating==4?"selected":""}>4</option>
                <option ${d.rating==5?"selected":""}>5</option>
                </select>
            </td>
            <td><button onclick="edit('${doc.id}')">Save</button></td>
            <td><button onclick="hapus('${doc.id}')">X</button></td>
            </tr>`;
            no++;
        });
    });
}

/* EDIT */
function edit(id){
    db.collection("kritik").doc(id).update({
        pesan:document.getElementById("p"+id).value,
        rating:Number(document.getElementById("r"+id).value)
    });
    load();
}

/* HAPUS */
function hapus(id){
    db.collection("kritik").doc(id).delete();
    load();
}

/* LOGIN */
function openLogin(){
    loginModal.style.display="flex";
}

function login(){
    if(user.value=="12345" && pass.value=="12345"){
        adminPanel.style.display="block";
        loginModal.style.display="none";
        load();
    }else alert("Salah");
}

load();
</script>

</body>
</html>
